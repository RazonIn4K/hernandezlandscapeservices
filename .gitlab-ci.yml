stages:
  - test
  - dast

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.v2.gitlab-ci.yml
  - template: DAST.gitlab-ci.yml

variables:
  DAST_WEBSITE: "https://razonin4k.github.io/hernandezlandscapeservices/"

site_quality:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  script:
    - npm ci
    - npm run build
    - npm run test:ci -- --project=chromium
    - npm run publish:prepare
    - npm run publish:check-layout
  artifacts:
    when: on_failure
    paths:
      - test-results/
      - playwright-report/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

dast:
  stage: dast
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
    - when: never
