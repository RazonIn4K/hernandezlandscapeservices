name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check generated media surfaces
        run: npm run media:check

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test:ci -- --project=chromium

      - name: Build site
        run: npm run build
        env:
          ADMIN_PHONE_ALLOWLIST: ${{ secrets.ADMIN_PHONE_ALLOWLIST }}

      - name: Stamp service worker cache version
        run: node scripts/stamp-sw-version.mjs

      - name: Remove build artifacts we don't need
        run: rm -rf node_modules

      - name: Prepare publish directory
        run: |
          mkdir -p publish
          rsync -av --exclude='.git' --exclude='.github' --exclude='node_modules' ./ publish/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Submit sitemap URLs to IndexNow
        run: node scripts/submit-indexnow.mjs
